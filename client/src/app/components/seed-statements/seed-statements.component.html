<div class="seed-section">
  <h3>{{ "statement.seed-statements" | translate }}</h3>

  <div class="add-form">
    <ion-input
      type="text"
      labelPlacement="stacked"
      mode="md"
      fill="outline"
      [(ngModel)]="newText"
      name="newText"
      [label]="'statement.add-seed' | translate"
      [maxlength]="charMax()"
    ></ion-input>
    <ion-note class="char-counter" [color]="isValid ? 'medium' : 'danger'">
      {{ charCount }} / {{ charMax() }}
    </ion-note>
    <ion-button expand="block" [disabled]="!isValid" (click)="addStatement()">
      <ion-icon name="add-outline" slot="start"></ion-icon>
      {{ "statement.add-seed" | translate }}
    </ion-button>
  </div>

  @if (statements().length > 0) {
    @for (st of statements(); track st.id) {
      <div class="statement-card">{{ st.text }}</div>
    }
  }
</div>
