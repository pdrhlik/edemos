<ion-app>
  @if (auth.isAuthenticated() && auth.isVerified()) {
    <ion-split-pane contentId="main-content" when="lg">
      <ion-menu contentId="main-content" type="overlay">
        <ion-header>
          <ion-toolbar>
            <ion-title>{{ "common.app-name" | translate }}</ion-title>
          </ion-toolbar>
        </ion-header>

        <ion-content>
          <ion-list>
            <ion-menu-toggle auto-hide="false">
              <ion-item
                routerLink="/surveys"
                routerLinkActive="selected"
                [routerLinkActiveOptions]="{ exact: true }"
                detail="false"
                button
              >
                <ion-icon name="list-outline" slot="start"></ion-icon>
                <ion-label>{{ "survey.surveys" | translate }}</ion-label>
              </ion-item>
              <ion-item routerLink="/settings" routerLinkActive="selected" detail="false" button>
                <ion-icon name="settings-outline" slot="start"></ion-icon>
                <ion-label>{{ "settings.settings" | translate }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          </ion-list>
        </ion-content>

        <ion-footer>
          <ion-toolbar>
            <ion-item lines="none" (click)="logout()" button detail="false">
              <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
              <ion-label color="danger">{{ "auth.logout" | translate }}</ion-label>
            </ion-item>
            @if (auth.currentUser(); as user) {
              <ion-item lines="none" class="user-info">
                <ion-label>
                  <p>{{ user.name }}</p>
                  <p class="user-email">{{ user.email }}</p>
                </ion-label>
              </ion-item>
            }
          </ion-toolbar>
        </ion-footer>
      </ion-menu>

      <ion-router-outlet id="main-content"></ion-router-outlet>
    </ion-split-pane>
  } @else {
    <ion-router-outlet></ion-router-outlet>
  }
</ion-app>
