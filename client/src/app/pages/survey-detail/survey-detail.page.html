<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/surveys"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ survey()?.title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (survey(); as s) {
    <div class="detail-container">
      <ion-card>
        <ion-card-header>
          <div class="card-header-row">
            <ion-card-title>{{ s.title }}</ion-card-title>
            <ion-badge [color]="statusColor(s.status)">
              {{ "survey." + s.status | translate }}
            </ion-badge>
          </div>
        </ion-card-header>
        <ion-card-content>
          @if (s.description) {
            <p class="description">{{ s.description }}</p>
          }
        </ion-card-content>
      </ion-card>

      <div class="actions">
        @if (s.status === "draft") {
          <ion-button expand="block" color="success" (click)="activate()">
            <ion-icon name="play-outline" slot="start"></ion-icon>
            {{ "survey.activate" | translate }}
          </ion-button>
        }
        @if (s.status === "active") {
          <ion-button expand="block" color="danger" (click)="closeSurvey()">
            <ion-icon name="close-outline" slot="start"></ion-icon>
            {{ "survey.close-survey" | translate }}
          </ion-button>
        }
      </div>
    </div>
  }
</ion-content>
