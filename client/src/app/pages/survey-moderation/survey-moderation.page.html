<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/survey/' + surveySlug"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ "moderation.queue" | translate }} ({{ queue().length }})</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="moderation-container">
    @if (queue().length === 0) {
      <div class="empty-state">
        <ion-text color="medium">
          <p>{{ "moderation.no-pending" | translate }}</p>
        </ion-text>
      </div>
    } @else {
      <ion-list>
        @for (st of queue(); track st.id) {
          <div class="moderation-card">
            <p class="statement-text">{{ st.text }}</p>
            <div class="action-buttons">
              <ion-button color="success" fill="outline" size="small" (click)="approve(st)">
                <ion-icon name="checkmark-outline" slot="start"></ion-icon>
                {{ "moderation.approve" | translate }}
              </ion-button>
              <ion-button color="danger" fill="outline" size="small" (click)="reject(st)">
                <ion-icon name="close-outline" slot="start"></ion-icon>
                {{ "moderation.reject" | translate }}
              </ion-button>
            </div>
          </div>
        }
      </ion-list>
    }
  </div>
</ion-content>
