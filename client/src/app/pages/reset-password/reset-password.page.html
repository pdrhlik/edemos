<ion-header>
  <ion-toolbar>
    <ion-title>{{ "auth.reset-password" | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <ion-input
        type="password"
        labelPlacement="stacked"
        fill="outline"
        [(ngModel)]="password"
        name="password"
        [label]="'auth.new-password' | translate"
      ></ion-input>

      <ion-input
        type="password"
        labelPlacement="stacked"
        fill="outline"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        [label]="'auth.confirm-password' | translate"
      ></ion-input>

      <ion-button expand="block" type="submit" [disabled]="submitting()">
        @if (submitting()) {
        <ion-spinner name="crescent"></ion-spinner>
        } @else { {{ "auth.reset-password" | translate }} }
      </ion-button>
    </form>

    <p class="auth-link">
      <a routerLink="/login">{{ "auth.back-to-login" | translate }}</a>
    </p>
  </div>
</ion-content>
