root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/edemos-server"
  cmd = "go build -o ./tmp/edemos-server ."
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "sql"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
