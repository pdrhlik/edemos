services:
  mariadb:
    image: mariadb:12
    container_name: edemos-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: edemos
      MARIADB_USER: edemos
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:3407:3306"
    networks:
      - edemos

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: edemos-server
    restart: unless-stopped
    environment:
      DB_DSN: edemos:${MARIADB_PASSWORD}@tcp(mariadb:3306)/edemos?parseTime=true
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      BASE_URL: ${BASE_URL}
      SERVE_WEBSITE: ${SERVE_WEBSITE:-true}
      WEBSITE_PATH: /app/website
    ports:
      - "127.0.0.1:8180:8080"
    networks:
      - edemos
    depends_on:
      - mariadb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: edemos-client
    restart: unless-stopped
    ports:
      - "127.0.0.1:4280:80"
    networks:
      - edemos

  adminer:
    image: adminer:5-standalone
    container_name: edemos-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:4281:8080"
    networks:
      - edemos
    depends_on:
      - mariadb

networks:
  edemos:
    driver: bridge

volumes:
  mariadb-data:
